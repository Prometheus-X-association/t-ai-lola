- name: Install Slurm dependencies (Debian/Ubuntu)
  apt:
    name:
      - munge
      - libmunge-dev
      - libmunge2
    state: present
  when: ansible_os_family == "Debian"

- name: Install Slurm dependencies (RedHat/CentOS)
  yum:
    name:
      - munge
      - munge-libs
      - munge-devel
    state: present
  when: ansible_os_family == "RedHat"

- name: Create munge key directory
  file:
    path: /etc/munge
    state: directory
    owner: munge
    group: munge
    mode: '0700'

- name: Copy munge key from controller
  copy:
    src: /tmp/munge.key
    dest: /etc/munge/munge.key
    owner: munge
    group: munge
    mode: '0400'

- name: Start and enable munge service
  systemd:
    name: munge
    state: started
    enabled: yes

- name: Install Slurm worker packages (Debian/Ubuntu)
  apt:
    name:
      - slurm-client
      - slurm-wlm
      - slurmd
    state: present
  when: ansible_os_family == "Debian"

- name: Install Slurm worker packages (RedHat/CentOS)
  yum:
    name:
      - slurm
      - slurm-slurmd
    state: present
  when: ansible_os_family == "RedHat"

- name: Create Slurm configuration directory
  file:
    path: /etc/slurm
    state: directory
    mode: '0755'

- name: Create Slurm log directory
  file:
    path: /var/log/slurm
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'

- name: Create Slurm spool directory
  file:
    path: /var/spool/slurm
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'

- name: Copy Slurm configuration from controller
  copy:
    src: /tmp/slurm.conf
    dest: /etc/slurm/slurm.conf
    owner: slurm
    group: slurm
    mode: '0644'
  notify: restart slurmd

- name: Start and enable slurmd
  systemd:
    name: slurmd
    state: started
    enabled: yes

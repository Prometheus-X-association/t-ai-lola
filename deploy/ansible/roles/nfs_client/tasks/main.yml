- name: Create NFS user
  user:
    name: "{{ nfs_user }}"
    state: present
    create_home: yes
    shell: /bin/bash

- name: Install NFS client packages (Debian/Ubuntu)
  apt:
    name:
      - nfs-common
    state: present
  when: ansible_os_family == "Debian"

- name: Install NFS client packages (RedHat/CentOS)
  yum:
    name:
      - nfs-utils
    state: present
  when: ansible_os_family == "RedHat"

- name: Create NFS mount point
  file:
    path: "{{ nfs_mount_path }}"
    state: directory
    owner: "{{ nfs_user }}"
    group: "{{ nfs_user }}"
    mode: '0755'

- name: Mount NFS share
  mount:
    path: "{{ nfs_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ nfs_mount_path }}"
    fstype: nfs
    opts: defaults
    state: mounted

- name: Ensure NFS mount persists on reboot
  mount:
    path: "{{ nfs_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ nfs_mount_path }}"
    fstype: nfs
    opts: defaults
    state: present
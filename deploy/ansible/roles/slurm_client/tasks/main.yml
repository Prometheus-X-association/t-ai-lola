- name: Install Slurm dependencies (Debian/Ubuntu)
  apt:
    name:
      - munge
      - libmunge-dev
      - libmunge2
    state: present
  when: ansible_os_family == "Debian"

- name: Install Slurm dependencies (RedHat/CentOS)
  yum:
    name:
      - munge
      - munge-libs
      - munge-devel
    state: present
  when: ansible_os_family == "RedHat"

- name: Create munge key directory
  file:
    path: /etc/munge
    state: directory
    owner: munge
    group: munge
    mode: '0700'

- name: Copy munge key from controller
  copy:
    src: /tmp/munge.key
    dest: /etc/munge/munge.key
    owner: munge
    group: munge
    mode: '0400'

- name: restart and enable munge service
  systemd:
    name: munge
    state: restarted
    enabled: true

- name: Install Slurm client packages only (Debian/Ubuntu)
  apt:
    name:
      - slurm-client
      - slurm-wlm
    state: present
  when: ansible_os_family == "Debian"

- name: Install Slurm client packages only (RedHat/CentOS)
  yum:
    name:
      - slurm
    state: present
  when: ansible_os_family == "RedHat"

- name: Create Slurm configuration directory
  file:
    path: /etc/slurm
    state: directory
    mode: '0755'


- name: Copy slurm config from controller
  copy:
    src: /tmp/slurm.conf
    dest: /etc/slurm/slurm.conf
    owner: slurm
    group: slurm
    mode: '0644'

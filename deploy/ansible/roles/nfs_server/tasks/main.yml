- name: Create NFS user
  user:
    name: "{{ nfs_user }}"
    state: present
    create_home: yes
    shell: /bin/bash

- name: Create NFS export directory
  file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: "{{ nfs_user }}"
    group: "{{ nfs_user }}"
    mode: '0755'

- name: Install NFS server packages (Debian/Ubuntu)
  apt:
    name:
      - nfs-kernel-server
      - nfs-common
    state: present
  when: ansible_os_family == "Debian"

- name: Install NFS server packages (RedHat/CentOS)
  yum:
    name:
      - nfs-utils
    state: present
  when: ansible_os_family == "RedHat"

- name: Configure NFS exports
  lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_path }} {{ nfs_allowed_network }}(rw,sync,no_subtree_check,no_root_squash)"
    create: yes
  notify: restart nfs server

- name: Start and enable NFS server (Debian/Ubuntu)
  systemd:
    name: nfs-kernel-server
    state: started
    enabled: yes
  when: ansible_os_family == "Debian"

- name: Start and enable NFS server (RedHat/CentOS)
  systemd:
    name: nfs-server
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Export NFS shares
  command: exportfs -ra
- name: Configure DMZ servers
  hosts: dmz
  become: yes
  roles:
    - common
    - docker
    - harbor
    - frontend

- name: Configure CALC servers
  hosts: calc
  become: yes
  roles:
    - common
    - create_user
    - slurm_controller
    - slurm_worker

- name: Configure ARCH servers
  hosts: arch
  become: yes
  roles:
    - common
    - docker
    - create_user
    - cron_script
    - harbor
    - nfs_server
    - slurm_client
    - lolapy

- name: Configure CALC servers
  hosts: calc
  become: yes
  roles:
    - nfs_client
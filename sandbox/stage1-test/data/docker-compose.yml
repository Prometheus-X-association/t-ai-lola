services:

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: ${COMPOSE_DB_NAME}
    # user: "${DOCKER_COMPOSE_UID}:${DOCKER_COMPOSE_GID}"
    volumes:
      - ${DB_DATA_DIR}:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - ${PORT_MYSQL}:3306
    restart: ${RESTART_SERVICES:-no}
    
  phpmyadmin:
    container_name: ${COMPOSE_PHPMYADMIN_NAME}
    image: phpmyadmin/phpmyadmin
    depends_on:
      - db
    ports:
      - ${PORT_PHPMYADMIN}:80
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    restart: ${RESTART_SERVICES:-no}

  trax:
    container_name: ${COMPOSE_TRAX_NAME}
    image: registry.gitlab.inria.fr/azim/edge-trax/trax_trax:latest
    ports:
      - ${LISTEN_ITF}:${PORT_TRAX_HTTP}:80
    volumes:
      - ${TRAX_ENV}:/var/www/html/traxlrs/.env
    restart: ${RESTART_SERVICES}

  data_uploader:
      image: curlimages/curl:latest
      depends_on:
        - trax
      volumes:
        - ./dataJson:/app/data
      entrypoint:
        - /bin/sh
        - -c
        - |
          echo 'Uploading oulad.json to Trax-LRS';
          sleep 15;
          curl --request POST http://trax:80/trax/ws/xapi/statements \
              --header "X-Experience-API-Version: 1.0.3" \
              --header "Content-Type: application/json" \
              --header "Accept: application/json" \
              -u testsuite:password \
              --data "@/app/data/oulad-data.json";
          echo 'Upload complete'

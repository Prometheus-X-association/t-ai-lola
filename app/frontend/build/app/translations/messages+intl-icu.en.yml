            date_creation: Date of creation
            modale_aide_titre: How to send dataset on Lola platform ?
            modale_aide: >
                <div class="card mb-2">
                    <h5 class="card-header text-white bg-primary">Requirements</h5>
                    <div class="card-body">
                        <ul>
                            <li>data_prepare tool to encrypt and send data;</li>
                            <li>an XAPI dataset;</li>
                            <li>a bordereau downloadable on application platform (see part 1).</li>
                        </ul>
                    </div>
                    <h5 class="card-header text-white bg-primary">Data_prepare, the tool to send data on Lola platform</h5>
                    <div class="card-body">
                        Download <a href="https://gitlab.inria.fr/lola/data_prepare/-/releases" target="_blank"><strong>Data_prepare <i class="fas fa-external-link-alt"></i></strong></a>.
                    </div>
                    <h5 class="card-header text-white bg-primary">Step by step:</h5>
                    <div class="card-body">
                        <p><strong><u>1. Register XAPI dataset and download bordereau</u></strong></p>
                        This step must be done on lola application platform. Click on "Add dataset" in "Dataset" tab. In the new window, you can set the name of the new dataset, its information and access permission. These information can be edit later. After validation, the bordereau is available.
                        <hr />
                        <p><strong><u>2. Download the bordereau</u></strong></p>
                        In the "Dataset", click on "Bordereau" to download the file.
                        <hr />
                        <p><strong><u>3. Send files with data_prepare tool</u></strong></p>
                        Open data_prepare tool on your system. Set path for bordereau and for the dataset file (XAPI format). You must set the path where to store the compressed/encrypted file in case of transfert failure. Click on "Encrypt" to start the compression/encryption. After the success, click on "Transfer to Lola-platform".                         <hr />
                        <p><strong><u>4. Check the status in the Lola application platform</u></strong></p>
                        The status of the dataset will be updated after few minutes in the platform application. Note that it can takes time, depending of the size of the XAPI file and the server occupation.
                    </div>
                </div>

            date_creation: Date de création
            modale_aide_titre: Comment envoyer un dataset sur Lola ?
            modale_aide: >
                <div class="card mb-2">
                    <h5 class="card-header text-white bg-primary">Comment envoyer un dataset sur Lola ?</h5>
                    <div class="card-body">
                        <p>Pour envoyer un dataset sur Lola, il faut disposer: </p>
                        <ul>
                            <li>de l'outil data_prepare pour chiffrer et envoyer les données;</li>
                            <li>d'un dataset au format xapi;</li>
                            <li>d'un bordereau téléchargeable sur l'application (voir partie 1).</li>
                        </ul>
                    </div>
                    <h5 class="card-header text-white bg-primary">Data_prepare, l'outil pour envoyer ses données sur les serveurs de Lola</h5>
                    <div class="card-body">
                        Télécharger <a href="https://gitlab.inria.fr/lola/data_prepare/-/releases" target="_blank"><strong>Data_prepare <i class="fas fa-external-link-alt"></i></strong></a>.
                    </div>
                    <h5 class="card-header text-white bg-primary">Étape par étape</h5>
                    <div class="card-body">
                        <p><strong><u>1. Renseignement du dataset et génération du bordereau</u></strong></p>
                        Cette étape est réalisée sur l'application web lola. Pour cela, aller dans l'onglet «Dataset». Ensuite cliquer sur «Ajouter un dataset». Dans la nouvelle fenêtre, il est nécessaire de donner un nom au nouveau dataset. Il est possible d'ajouter une description du dataset et de modifier les permissions d'accès. Ces informations peuvent être modifiées après l'enregistrement d'un dataset. Une fois cette étape réalisée, un bordereau est automatiquement créé.
                        <hr />
                        <p><strong><u>2. Téléchargement du bordereau</u></strong></p>
                        Dans l'onglet dataset, cliquer sur le bouton «Bordereau» pour enregistrer le fichier de bordereau.
                        <hr />
                        <p><strong><u>3. Envoie des données avec l'outil data_prepare</u></strong></p>
                        Double cliquez sur l'outil data_prepare. Une fois ouvert, renseignez les chemins pour le dataset et pour le bordereau. Le fichier compressé et chiffré est également sauvegardé sur votre ordinateur en cas d'echec de transfert au serveur Lola. Cliquez sur «Encrypt» pour démarrer la compression/chiffrement. Une fois fais, il est possible de cliquer sur «Transfer to Lola-platform».
                        <hr />
                        <p><strong><u>4. Vérifier le status dans l'application web lola</u></strong></p>
                        Une fois le fichier transféré, le status peut être suivit dans l'application web lola. À noter qu'il peut se passer un peu de temps avant que le status passe à processing. Une fois terminé, le status passe alors en available indiquant que le dataset est prêt.
                    </div>
                </div>
